<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>MedLink EHR - Secure Login | Kenya Healthcare System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2e1065 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: logoGlow 2s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(102, 126, 234, 0); }
        }

        .logo-icon i {
            font-size: 32px;
            color: white;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .logo p {
            color: #6b7280;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 0.875rem;
        }

        .form-label i {
            margin-right: 8px;
            color: #667eea;
            font-size: 0.875rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i:first-child {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-control.error {
            border-color: #ef4444;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
            transition: color 0.3s ease;
            z-index: 5;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-login:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert i {
            font-size: 1.2rem;
        }

        .alert-danger {
            background: #fef2f2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border-left: 4px solid #22c55e;
        }

        .alert-info {
            background: #eff6ff;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }

        .alert-warning {
            background: #fffbeb;
            color: #92400e;
            border-left: 4px solid #f59e0b;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: white;
            font-size: 1rem;
            font-weight: 500;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .otp-input-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .otp-digit {
            width: 60px;
            height: 70px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            background: white;
            transition: all 0.3s ease;
        }

        .otp-digit:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .otp-digit.error {
            border-color: #ef4444;
            animation: shake 0.5s ease;
        }

        .resend-otp {
            text-align: center;
            margin-top: 16px;
        }

        .resend-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .resend-link:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        .timer {
            color: #6b7280;
            font-size: 0.875rem;
            margin-top: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .footer p {
            color: #6b7280;
            font-size: 0.8rem;
        }

        .footer-links {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .footer-links a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.75rem;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #667eea;
        }

        @media (max-width: 640px) {
            .login-card {
                padding: 32px 24px;
            }
            
            .otp-digit {
                width: 45px;
                height: 55px;
                font-size: 1.4rem;
            }
            
            .logo-icon {
                width: 55px;
                height: 55px;
            }
            
            .logo-icon i {
                font-size: 26px;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            animation: fadeInUp 0.6s ease;
        }
    </style>
</head>
<body>
    <div id="particles"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-heartbeat"></i>
                </div>
                <h1>MedLink EHR</h1>
                <p>Kenya Healthcare System</p>
            </div>

            <div id="alertContainer"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-circle"></i>
                        <input type="text" id="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                        <i class="fas fa-eye-slash password-toggle" onclick="togglePassword()"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="loginBtnText">Sign In</span>
                    <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                </button>
            </form>

            <form id="twoFactorForm" style="display: none;">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-shield-alt"></i>
                        Enter Verification Code
                    </label>
                    <div class="otp-input-container" id="otpContainer">
                        <input type="text" maxlength="1" class="otp-digit" data-index="0" id="otp0" autofocus>
                        <input type="text" maxlength="1" class="otp-digit" data-index="1" id="otp1">
                        <input type="text" maxlength="1" class="otp-digit" data-index="2" id="otp2">
                        <input type="text" maxlength="1" class="otp-digit" data-index="3" id="otp3">
                        <input type="text" maxlength="1" class="otp-digit" data-index="4" id="otp4">
                        <input type="text" maxlength="1" class="otp-digit" data-index="5" id="otp5">
                    </div>
                    <input type="hidden" id="otpCode" value="">
                    <div class="resend-otp">
                        <a class="resend-link" onclick="resendOTP()">Didn't receive code? Resend</a>
                        <div class="timer" id="timerDisplay"></div>
                    </div>
                </div>
                
                <button type="submit" class="btn-login" id="verifyBtn">
                    <span>Verify & Continue</span>
                    <i class="fas fa-check-circle" style="margin-left: 8px;"></i>
                </button>
                <button type="button" class="btn-login" onclick="backToLogin()" style="background: #6b7280; margin-top: 12px;">
                    <i class="fas fa-arrow-left" style="margin-right: 8px;"></i>
                    Back to Login
                </button>
            </form>

            <!-- Register Link - ADDED HERE -->
            <div class="text-center mt-6">
                <p class="text-gray-600">Don't have an account? 
                    <a href="/register/" class="text-blue-600 hover:text-blue-700 font-medium">Create an account</a>
                </p>
            </div>

            <div class="footer">
                <p>© 2026 MedLink EHR. All rights reserved.</p>
                <div class="footer-links">
                    <a href="#">Privacy Policy</a>
                    <a href="#">Terms of Service</a>
                    <a href="#">Contact Support</a>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Authenticating...</div>
    </div>

    <script>
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        let userId = null;
        let otpTimer = null;
        let timeLeft = 60;
        let failedAttempts = 0;
        let lockUntil = null;

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 20 + 10 + 's';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particlesContainer.appendChild(particle);
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.password-toggle');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            }
        }

        function setupOTPInputs() {
            const inputs = document.querySelectorAll('.otp-digit');
            
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length === 1 && index < 5) {
                        document.getElementById(`otp${index + 1}`).focus();
                    }
                    updateOTPCode();
                });
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        document.getElementById(`otp${index - 1}`).focus();
                    }
                });
                
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const paste = e.clipboardData.getData('text');
                    if (paste && paste.length === 6 && /^\d+$/.test(paste)) {
                        for (let i = 0; i < 6; i++) {
                            const otpInput = document.getElementById(`otp${i}`);
                            if (otpInput) otpInput.value = paste[i];
                        }
                        updateOTPCode();
                        document.getElementById('verifyBtn').focus();
                    }
                });
            });
        }

        function updateOTPCode() {
            let code = '';
            for (let i = 0; i < 6; i++) {
                const input = document.getElementById(`otp${i}`);
                if (input) code += input.value;
            }
            document.getElementById('otpCode').value = code;
        }

        function getOTPCode() {
            let code = '';
            for (let i = 0; i < 6; i++) {
                const input = document.getElementById(`otp${i}`);
                if (input) code += input.value;
            }
            return code;
        }

        function startOTPTimer() {
            timeLeft = 60;
            const timerDisplay = document.getElementById('timerDisplay');
            const resendLink = document.querySelector('.resend-link');
            
            if (otpTimer) clearInterval(otpTimer);
            
            otpTimer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(otpTimer);
                    timerDisplay.innerHTML = '';
                    if (resendLink) resendLink.style.pointerEvents = 'auto';
                } else {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    timerDisplay.innerHTML = `Resend code in ${minutes}:${seconds.toString().padStart(2, '0')}`;
                    if (resendLink) resendLink.style.pointerEvents = 'none';
                }
            }, 1000);
        }

        async function resendOTP() {
            if (timeLeft > 0) {
                showAlert(`Please wait ${timeLeft} seconds before requesting again`, 'warning');
                return;
            }
            
            showLoading();
            
            try {
                const response = await fetch('/api/accounts/auth/resend-otp/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ user_id: userId })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('New OTP sent to your registered contact', 'success');
                    startOTPTimer();
                } else {
                    showAlert(data.error || 'Failed to resend OTP', 'danger');
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'danger');
            } finally {
                hideLoading();
            }
        }

        function backToLogin() {
            document.getElementById('twoFactorForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            if (otpTimer) clearInterval(otpTimer);
            failedAttempts = 0;
        }

        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            
            let icon = '';
            switch(type) {
                case 'danger': icon = '<i class="fas fa-exclamation-circle"></i>'; break;
                case 'success': icon = '<i class="fas fa-check-circle"></i>'; break;
                case 'info': icon = '<i class="fas fa-info-circle"></i>'; break;
                case 'warning': icon = '<i class="fas fa-exclamation-triangle"></i>'; break;
            }
            
            alert.innerHTML = `${icon}<span>${message}</span>`;
            alertContainer.appendChild(alert);
            
            setTimeout(() => {
                alert.style.opacity = '0';
                alert.style.transform = 'translateY(-20px)';
                setTimeout(() => alert.remove(), 300);
            }, 5000);
        }

        function clearAlerts() {
            document.getElementById('alertContainer').innerHTML = '';
        }

        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            const loginBtn = document.getElementById('loginBtn');
            if (loginBtn) loginBtn.disabled = true;
            const verifyBtn = document.getElementById('verifyBtn');
            if (verifyBtn) verifyBtn.disabled = true;
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
            const loginBtn = document.getElementById('loginBtn');
            if (loginBtn) loginBtn.disabled = false;
            const verifyBtn = document.getElementById('verifyBtn');
            if (verifyBtn) verifyBtn.disabled = false;
        }

        function validateForm(username, password) {
            if (!username.trim()) {
                showAlert('Please enter your username', 'warning');
                document.getElementById('username').focus();
                document.getElementById('username').classList.add('error');
                setTimeout(() => document.getElementById('username').classList.remove('error'), 500);
                return false;
            }
            
            if (!password) {
                showAlert('Please enter your password', 'warning');
                document.getElementById('password').focus();
                document.getElementById('password').classList.add('error');
                setTimeout(() => document.getElementById('password').classList.remove('error'), 500);
                return false;
            }
            
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'warning');
                document.getElementById('password').focus();
                return false;
            }
            
            return true;
        }

        function getDashboardUrl(role) {
            const dashboardMap = {
                'super_admin': '/dashboard/admin/',
                'admin': '/dashboard/admin/',
                'doctor': '/dashboard/doctor/',
                'clinical_officer': '/dashboard/doctor/',
                'nurse': '/dashboard/nurse/',
                'lab_technician': '/dashboard/lab/',
                'pharmacist': '/dashboard/pharmacy/',
                'pharmacy_tech': '/dashboard/pharmacy/',
                'records_officer': '/dashboard/records/',
                'receptionist': '/dashboard/reception/',
                'cashier': '/dashboard/cashier/',
                'manager': '/dashboard/manager/',
                'viewer': '/dashboard/viewer/',
            };
            return dashboardMap[role] || '/dashboard/';
        }

        async function handleSuccessfulLogin(data) {
            localStorage.setItem('access_token', data.access);
            localStorage.setItem('refresh_token', data.refresh);
            
            let redirectUrl = '/dashboard/';
            
            if (data.dashboard_url) {
                redirectUrl = data.dashboard_url;
            } else if (data.user && data.user.role) {
                redirectUrl = getDashboardUrl(data.user.role);
            }
            
            localStorage.setItem('user_role', data.user?.role || '');
            localStorage.setItem('user_name', data.user?.full_name || data.user?.username || '');
            
            showAlert(`Welcome back! Redirecting to your dashboard...`, 'success');
            
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 1000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (lockUntil && new Date() < lockUntil) {
                const waitSeconds = Math.ceil((lockUntil - new Date()) / 1000);
                showAlert(`Too many failed attempts. Please wait ${waitSeconds} seconds.`, 'warning');
                return;
            }
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!validateForm(username, password)) return;
            
            showLoading();
            clearAlerts();
            
            try {
                const response = await fetch('/api/accounts/auth/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    failedAttempts = 0;
                    lockUntil = null;
                    
                    if (data.requires_2fa) {
                        userId = data.user_id;
                        document.getElementById('loginForm').style.display = 'none';
                        document.getElementById('twoFactorForm').style.display = 'block';
                        showAlert('Please enter the 6-digit code sent to your registered contact', 'info');
                        startOTPTimer();
                        setupOTPInputs();
                        
                        for (let i = 0; i < 6; i++) {
                            const input = document.getElementById(`otp${i}`);
                            if (input) input.value = '';
                        }
                        if (document.getElementById('otp0')) document.getElementById('otp0').focus();
                    } else {
                        await handleSuccessfulLogin(data);
                    }
                } else {
                    failedAttempts++;
                    
                    if (failedAttempts >= 5) {
                        lockUntil = new Date(Date.now() + 15 * 60 * 1000);
                        showAlert('Too many failed attempts. Account temporarily locked for 15 minutes.', 'danger');
                    } else {
                        showAlert(data.error || 'Login failed. Please check your credentials.', 'danger');
                    }
                    
                    const loginCard = document.querySelector('.login-card');
                    loginCard.style.animation = 'shake 0.5s ease';
                    setTimeout(() => {
                        loginCard.style.animation = '';
                    }, 500);
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Network error. Please check your connection and try again.', 'danger');
            } finally {
                hideLoading();
            }
        });
        
        document.getElementById('twoFactorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const otp = getOTPCode();
            
            if (otp.length !== 6) {
                showAlert('Please enter the complete 6-digit code', 'warning');
                for (let i = 0; i < 6; i++) {
                    const input = document.getElementById(`otp${i}`);
                    if (input && !input.value) {
                        input.classList.add('error');
                        setTimeout(() => input.classList.remove('error'), 500);
                    }
                }
                return;
            }
            
            showLoading();
            
            try {
                const response = await fetch('/api/accounts/auth/verify-2fa/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ otp, user_id: userId })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    await handleSuccessfulLogin(data);
                } else {
                    showAlert(data.error || 'Invalid OTP. Please try again.', 'danger');
                    
                    for (let i = 0; i < 6; i++) {
                        const input = document.getElementById(`otp${i}`);
                        if (input) {
                            input.value = '';
                            input.classList.add('error');
                            setTimeout(() => input.classList.remove('error'), 500);
                        }
                    }
                    if (document.getElementById('otp0')) document.getElementById('otp0').focus();
                }
            } catch (error) {
                console.error('2FA verification error:', error);
                showAlert('Verification failed. Please try again.', 'danger');
            } finally {
                hideLoading();
            }
        });
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
        
        document.getElementById('username').addEventListener('focus', () => {
            document.getElementById('username').classList.remove('error');
        });
        
        document.getElementById('password').addEventListener('focus', () => {
            document.getElementById('password').classList.remove('error');
        });
        
        // Auto-login check removed to prevent redirect loops
        // Users will need to log in manually each time
        
        createParticles();
        
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', (e) => {
                e.target.parentElement.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', (e) => {
                if (!e.target.value) {
                    e.target.parentElement.parentElement.classList.remove('focused');
                }
            });
        });

        window.getDashboardUrl = getDashboardUrl;
    </script>
</body>
</html>
