<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Register - MedLink EHR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .register-container {
            animation: fadeInUp 0.6s ease-out;
        }
        
        .form-input:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            border-color: #667eea;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .alert-error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
        .alert-success { background: #dcfce7; color: #166534; border-left: 4px solid #22c55e; }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .role-card {
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
        }
        
        .role-card:hover {
            transform: translateY(-3px);
            border-color: #667eea;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.1);
        }
        
        .role-card.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-purple-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto register-container">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl mb-4">
                    <i class="fas fa-user-plus text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800">Create Account</h1>
                <p class="text-gray-600 mt-2">Join MedLink EHR System</p>
            </div>

            <!-- Alert Container -->
            <div id="alertContainer"></div>

            <!-- Registration Form -->
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <form id="registerForm">
                    {% csrf_token %}
                    
                    <!-- Personal Information -->
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 pb-2 border-b">Personal Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="fas fa-user text-blue-500 mr-1"></i> First Name *
                            </label>
                            <input type="text" id="firstName" name="first_name" required
                                class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="fas fa-user text-blue-500 mr-1"></i> Last Name *
                            </label>
                            <input type="text" id="lastName" name="last_name" required
                                class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none">
                        </div>
                    </div>

                    <!-- Account Information -->
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 pb-2 border-b mt-4">Account Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="fas fa-envelope text-blue-500 mr-1"></i> Email *
                            </label>
                            <input type="email" id="email" name="email" required
                                class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="fas fa-user-circle text-blue-500 mr-1"></i> Username *
                            </label>
                            <input type="text" id="username" name="username" required
                                class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="fas fa-lock text-blue-500 mr-1"></i> Password *
                            </label>
                            <input type="password" id="password" name="password" required
                                class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="fas fa-lock text-blue-500 mr-1"></i> Confirm Password *
                            </label>
                            <input type="password" id="password2" name="password2" required
                                class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none">
                        </div>
                    </div>

                    <!-- Contact Information -->
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 pb-2 border-b mt-4">Contact Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="fas fa-phone text-blue-500 mr-1"></i> Phone Number
                            </label>
                            <input type="tel" id="phone" name="phone_number"
                                class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="fas fa-id-card text-blue-500 mr-1"></i> Employee Number
                            </label>
                            <input type="text" id="employeeNumber" name="employee_number"
                                class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="fas fa-venus-mars text-blue-500 mr-1"></i> Gender
                            </label>
                            <select id="gender" name="gender" class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none">
                                <option value="">Select Gender</option>
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                                <option value="O">Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="fas fa-calendar text-blue-500 mr-1"></i> Date of Birth
                            </label>
                            <input type="date" id="dob" name="date_of_birth"
                                class="form-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none">
                        </div>
                    </div>

                    <!-- Role Selection -->
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 pb-2 border-b mt-4">Select Your Role</h3>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 mb-6">
                        <div class="role-card rounded-lg p-3 text-center" data-role="doctor">
                            <i class="fas fa-user-md text-2xl text-blue-500 mb-2"></i>
                            <p class="text-sm font-medium">Doctor</p>
                        </div>
                        <div class="role-card rounded-lg p-3 text-center" data-role="nurse">
                            <i class="fas fa-user-nurse text-2xl text-green-500 mb-2"></i>
                            <p class="text-sm font-medium">Nurse</p>
                        </div>
                        <div class="role-card rounded-lg p-3 text-center" data-role="lab_technician">
                            <i class="fas fa-microscope text-2xl text-purple-500 mb-2"></i>
                            <p class="text-sm font-medium">Lab Technician</p>
                        </div>
                        <div class="role-card rounded-lg p-3 text-center" data-role="pharmacist">
                            <i class="fas fa-capsules text-2xl text-orange-500 mb-2"></i>
                            <p class="text-sm font-medium">Pharmacist</p>
                        </div>
                        <div class="role-card rounded-lg p-3 text-center" data-role="receptionist">
                            <i class="fas fa-calendar-check text-2xl text-teal-500 mb-2"></i>
                            <p class="text-sm font-medium">Receptionist</p>
                        </div>
                        <div class="role-card rounded-lg p-3 text-center" data-role="cashier">
                            <i class="fas fa-money-bill-wave text-2xl text-yellow-500 mb-2"></i>
                            <p class="text-sm font-medium">Cashier</p>
                        </div>
                        <div class="role-card rounded-lg p-3 text-center" data-role="clinical_officer">
                            <i class="fas fa-stethoscope text-2xl text-indigo-500 mb-2"></i>
                            <p class="text-sm font-medium">Clinical Officer</p>
                        </div>
                        <div class="role-card rounded-lg p-3 text-center" data-role="viewer">
                            <i class="fas fa-eye text-2xl text-gray-500 mb-2"></i>
                            <p class="text-sm font-medium">Viewer</p>
                        </div>
                    </div>
                    <input type="hidden" id="role" name="role" value="">

                    <button type="submit" class="btn-register w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg font-semibold hover:shadow-lg transition">
                        <span id="btnText">Create Account</span>
                        <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </form>

                <div class="text-center mt-6">
                    <p class="text-gray-600">Already have an account? 
                        <a href="/login/" class="text-blue-600 hover:text-blue-700 font-medium">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        let selectedRole = '';

        // Role selection
        document.querySelectorAll('.role-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedRole = card.dataset.role;
                document.getElementById('role').value = selectedRole;
            });
        });

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-2"></i> ${message}`;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        function clearAlerts() {
            document.getElementById('alertContainer').innerHTML = '';
        }

        function showLoading() {
            document.getElementById('btnText').innerHTML = '<span class="loading-spinner"></span> Creating...';
            document.querySelector('.btn-register').disabled = true;
        }

        function hideLoading() {
            document.getElementById('btnText').innerHTML = 'Create Account';
            document.querySelector('.btn-register').disabled = false;
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            
            if (password !== password2) {
                showAlert('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'error');
                return;
            }
            
            if (!selectedRole) {
                showAlert('Please select a role', 'error');
                return;
            }
            
            const formData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: password,
                password2: password2,
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                phone_number: document.getElementById('phone').value,
                role: selectedRole,
                employee_number: document.getElementById('employeeNumber').value,
                gender: document.getElementById('gender').value,
                date_of_birth: document.getElementById('dob').value
            };
            
            clearAlerts();
            showLoading();
            
            try {
                const response = await fetch('/api/accounts/auth/register/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('user_role', data.role);
                    
                    showAlert('Registration successful! Redirecting to dashboard...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = data.dashboard_url;
                    }, 1500);
                } else {
                    let errorMsg = 'Registration failed';
                    if (data.role) errorMsg = data.role[0];
                    else if (data.username) errorMsg = data.username[0];
                    else if (data.email) errorMsg = data.email[0];
                    else if (data.password) errorMsg = data.password[0];
                    else if (data.non_field_errors) errorMsg = data.non_field_errors[0];
                    showAlert(errorMsg, 'error');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('Network error. Please try again.', 'error');
            } finally {
                hideLoading();
            }
        });
    </script>
</body>
</html>
